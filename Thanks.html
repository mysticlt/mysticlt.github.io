<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>提交成功</title>
  <meta http-equiv="refresh" content="3;url=./">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fa;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      padding: 48px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
      max-width: 400px;
    }
    .icon {
      width: 64px;
      height: 64px;
      background: #e8f5e9;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      color: #34a853;
      font-size: 32px;
    }
    h1 { font-size: 24px; color: #202124; margin-bottom: 12px; font-weight: 500; }
    p { color: #5f6368; margin-bottom: 24px; line-height: 1.5; }
    a {
      color: #1a73e8;
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>提交成功</h1>
    <p>感谢您的申请，我们会尽快审核并联系您。</p>
    <p>3秒后自动返回 <a href="./">首页</a></p>
  </div>
</body>
</html>
